name: Build Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  NODE_VERSION: 24.11.1
  RELEASE_CHANNEL: development

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64

      - name: Build production app
        run: yarn build:prod
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64

      - name: Package production app
        run: yarn package
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/GitHubDesktop-*.nupkg
            dist/GitHubDesktop*Setup-x64.exe
            dist/GitHubDesktop*Setup-x64.msi
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x64
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64

      - name: Build production app
        run: yarn build:prod
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64

      - name: Package production app
        run: yarn package
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: dist/*.zip
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn
        env:
          npm_config_arch: arm64
          TARGET_ARCH: arm64

      - name: Build production app
        run: yarn build:prod
        env:
          npm_config_arch: arm64
          TARGET_ARCH: arm64

      - name: Package production app
        run: yarn package
        env:
          npm_config_arch: arm64
          TARGET_ARCH: arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*.zip
          if-no-files-found: error

  attach-assets:
    name: Attach Assets To Release
    needs:
      - build-windows-x64
      - build-macos-x64
      - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-staging

          find_one() {
            find release-assets -type f "$@" | head -n 1
          }

          require_file() {
            local label="$1"
            local path="$2"
            if [ -z "$path" ]; then
              echo "Missing expected artifact: $label" >&2
              echo "Downloaded files were:" >&2
              find release-assets -type f | sort >&2
              exit 1
            fi
          }

          mac_arm64="$(find_one -name '*arm64*.zip')"
          mac_x64="$(find_one -name '*x64*.zip')"
          win_full="$(find_one -name '*full.nupkg')"
          win_delta="$(find_one -name '*delta.nupkg')"
          win_exe="$(find_one -name 'GitHubDesktop*Setup-x64.exe')"
          win_msi="$(find_one -name 'GitHubDesktop*Setup-x64.msi')"

          require_file 'macOS arm64 zip' "$mac_arm64"
          require_file 'macOS x64 zip' "$mac_x64"
          require_file 'Windows full nupkg' "$win_full"
          require_file 'Windows exe installer' "$win_exe"
          require_file 'Windows msi installer' "$win_msi"

          if [ -z "$win_delta" ]; then
            win_delta="$win_full"
          fi

          cp "$mac_arm64" "release-staging/GitHub Desktop ${version} macOS arm64.zip"
          cp "$mac_x64" "release-staging/GitHub Desktop ${version} macOS x64.zip"
          cp "$win_delta" "release-staging/GitHub Desktop ${version} Windows x64 Delta Nupkg.nupkg"
          cp "$win_full" "release-staging/GitHub Desktop ${version} Windows x64 Full Nupkg.nupkg"
          cp "$win_exe" "release-staging/GitHub Desktop ${version} Windows x64 EXE Installer.exe"
          cp "$win_msi" "release-staging/GitHub Desktop ${version} Windows x64 MSI Installer.msi"

          (
            cd release-staging
            sha256sum \
              "GitHub Desktop ${version} macOS arm64.zip" \
              "GitHub Desktop ${version} macOS x64.zip" \
              "GitHub Desktop ${version} Windows x64 Delta Nupkg.nupkg" \
              "GitHub Desktop ${version} Windows x64 Full Nupkg.nupkg" \
              "GitHub Desktop ${version} Windows x64 EXE Installer.exe" \
              "GitHub Desktop ${version} Windows x64 MSI Installer.msi" \
              > "GitHub Desktop ${version} checksums"
          )

          ls -la release-staging

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-staging/*
          fail_on_unmatched_files: true
          overwrite_files: true
